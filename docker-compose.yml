version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: curalink-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - curalink-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: curalink-redis
    ports:
      - '6379:6379'
    networks:
      - curalink-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama
    container_name: curalink-ollama
    command: serve
    ports:
      - '11435:11434'
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - curalink-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  embedder:
    build: ./embedder
    container_name: curalink-embedder
    ports:
      - '8000:8000'
    networks:
      - curalink-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: curalink-qdrant
    ports:
      - '6333:6333'
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - curalink-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: curalink-backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      embedder:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - curalink-net
    restart: unless-stopped

volumes:
  mongo-data:
  ollama-data:
  qdrant-data:

networks:
  curalink-net:
    driver: bridge
